<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rejected Incidents - PrismCorp Advisor</title>
    <style>
        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: #f4f6fb;
            color: #111827;
        }
        .topbar {
            background: #2f3e8a;
            color: white;
            padding: 24px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .topbar a {
            color: #dbeafe;
            text-decoration: none;
            border: 1px solid rgba(255,255,255,0.25);
            padding: 10px 18px;
            border-radius: 8px;
            transition: background 0.2s ease;
            margin-left: 10px;
        }
        .topbar a:hover {
            background: rgba(255,255,255,0.1);
        }
        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 30px 20px 60px;
        }
        .section {
            background: white;
            border-radius: 16px;
            padding: 26px;
            margin-bottom: 24px;
            box-shadow: 0 10px 35px rgba(15, 23, 42, 0.05);
        }
        .section h2 {
            margin-bottom: 18px;
            font-size: 1.35rem;
            color: #111827;
        }
        .rejected-card {
            border: 1px solid #e5e7eb;
            border-radius: 14px;
            padding: 20px;
            margin-bottom: 18px;
            background: #ffffff;
        }
        .rejected-card h3 {
            margin: 0 0 12px;
            font-size: 1.15rem;
        }
        .rejected-card p {
            margin: 8px 0;
            color: #4b5563;
            line-height: 1.6;
        }
        .label {
            font-weight: 700;
            color: #1f2937;
        }
        .badge {
            display: inline-flex;
            align-items: center;
            border-radius: 999px;
            padding: 6px 12px;
            font-size: 0.85rem;
            font-weight: 700;
            margin-top: 10px;
        }
        .badge.rejected { background: #fee2e2; color: #b91c1c; }
        .badge.open { background: #e0f2fe; color: #0369a1; }
        .badge.approved { background: #dcfce7; color: #166534; }
        .meta-grid {
            display: grid;
            grid-template-columns: repeat(3, minmax(180px, 1fr));
            gap: 14px;
            margin-top: 18px;
        }
        .meta-item {
            background: #f8fafc;
            border-radius: 12px;
            padding: 14px;
            border: 1px solid #e5e7eb;
        }
        .meta-item strong {
            display: block;
            margin-bottom: 8px;
            color: #374151;
        }
        @media (max-width: 820px) {
            .meta-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="topbar">
        <div>
            <h1>Rejected Incidents</h1>
            <p style="margin-top: 6px; color: #dbeafe; opacity: 0.95;">Review rejected recommendations and learn why decisions were not accepted.</p>
        </div>
        <div>
            <a href="/dashboard">KPI Dashboard</a>
            <a href="/demo">Demo</a>
        </div>
    </div>
    <div class="container">
        <div class="section">
            <h2>Rejected Decisions</h2>
            <div id="rejectedList">Loading rejected incident data...</div>
        </div>
    </div>
    <script>
        async function loadRejectedIncidents() {
            try {
                const response = await fetch('/api/incidents/rejected');
                const data = await response.json();
                const list = document.getElementById('rejectedList');

                if (data.status !== 'success' || !data.rejected_incidents.length) {
                    list.innerHTML = '<p style="color: #6b7280;">No rejected incidents yet.</p>';
                    return;
                }

                let html = '';
                data.rejected_incidents.forEach(item => {
                    const audit = item.audit;
                    const incident = item.incident || {};
                    html += `
                        <div class="rejected-card">
                            <h3>${incident.incident_id || audit.incident_id} — ${incident.shipment_id || 'Unknown shipment'}</h3>
                            <p><span class="label">Port:</span> ${incident.port || 'Unknown'}</p>
                            <p><span class="label">Summary:</span> ${incident.summary || 'No summary available'}</p>
                            <div class="meta-grid">
                                <div class="meta-item"><strong>Recommendation</strong>${audit.recommended_option || 'N/A'}</div>
                                <div class="meta-item"><strong>Reason</strong>${audit.reasoning || 'N/A'}</div>
                                <div class="meta-item"><strong>Rejection Notes</strong>${audit.approval_notes || 'N/A'}</div>
                                <div class="meta-item"><strong>Cost Delta</strong>$${(audit.cost_delta || 0).toLocaleString()}</div>
                                <div class="meta-item"><strong>Risk Level</strong>${audit.risk_level || 'N/A'}</div>
                                <div class="meta-item"><strong>Incident Status</strong><span class="badge rejected">Rejected</span></div>
                            </div>
                            <p style="margin-top: 16px;"><span class="label">Rejected at:</span> ${audit.approval_timestamp || audit.created_at || 'Unknown'}</p>
                        </div>
                    `;
                });
                list.innerHTML = html;
            } catch (error) {
                document.getElementById('rejectedList').innerHTML = `<p style="color: #b91c1c;">Failed to load rejected incidents: ${error.message}</p>`;
            }
        }

        loadRejectedIncidents();
    </script>
</body>
</html>
